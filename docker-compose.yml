version: '3.8'

services:
  # Jaeger: All-in-one tracing backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      # UI
      - "16686:16686"
      # Collector endpoints
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      # Thrift receivers (for Jaeger agent)
      - "6831:6831/udp" # Jaeger agent (compact thrift)
      - "6832:6832/udp" # Jaeger agent (binary thrift)
      - "5778:5778"     # Agent serve frontend
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MCP Proxy Application
  mcp-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-proxy
    ports:
      - "8000:8000"
    environment:
      # Observability configuration
      ENABLE_TELEMETRY: "true"
      EXPORTER_TYPE: "jaeger"
      JAEGER_HOST: "jaeger"
      JAEGER_PORT: "6831"
      SERVICE_NAME: "mcp-proxy"
      ENV: "development"
      
      # Application config
      LOG_LEVEL: "INFO"
    depends_on:
      jaeger:
        condition: service_healthy
    volumes:
      - .:/app
      - ./config:/app/config
    command: >
      python -m uvicorn proxy:app 
      --host 0.0.0.0 
      --port 8000 
      --reload

  # Optional: Prometheus for metrics (if using metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

networks:
  default:
    name: mcp-network
    driver: bridge

# Instructions:
# 1. Start all services: docker-compose up -d
# 2. View Jaeger UI: http://localhost:16686
# 3. Access proxy API: http://localhost:8000
# 4. View metrics: http://localhost:9090
# 5. View API docs: http://localhost:8000/docs
# 6. Stop all services: docker-compose down
